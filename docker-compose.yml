version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rupeeflow-db
    environment:
      POSTGRES_USER: ${DB_USER:-root}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      POSTGRES_DB: ${DB_NAME:-rupeeflow}
    ports:
      - "5433:5432"
    volumes:
      - rupeeflow-data:/var/lib/postgresql/data
      - ./services/core-api-go/internal/storage/postgres/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  core-api:
    container_name: rupeeflow-core-api
    build:
      context: ./services/core-api-go
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./services/core-api-go/.env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  nlp-api:
    container_name: rupeeflow-nlp-api
    build:
      context: ./services/nlp-api-python
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./services/nlp-api-python/.env
    restart: unless-stopped

volumes:
  rupeeflow-data:
    driver: local
