version: "2"
sql:
  - engine: "postgresql"
    schema: "internal/storage/postgres/schema.sql"
    queries: "internal/storage/postgres/queries.sql"
    gen:
      go:
        package: "postgres"
        out: "internal/storage/postgres"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
